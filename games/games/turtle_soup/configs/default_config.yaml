game:
  name: turtle_soup
  num_players: 4
  max_rounds: 20
  language: zh
  seed: 42
  puzzles:
    - title: "最后一班地铁"
      surface: "一个男人在地铁站等最后一班地铁，地铁到站后，他却转身离开了。第二天，人们在医院的病房里见到了他。"
      truth: "这个男人是一名地铁安全检查员。他等最后一班地铁是为了确认所有乘客都安全下车。他在巡查时发现了一个昏倒在车厢里的乘客，把那个人送去了医院，他第二天去医院探望那个乘客。"

    - title: "雨夜的微笑"
      surface: "一个女人独自住在公寓里。一个雨夜，她听到楼下传来匆忙的脚步声，于是她笑了。"
      truth: "这个女人经营一家网上雨伞店。她笑是因为下雨天意味着明天会有很多订单。楼下匆忙的脚步声是路人在雨中赶路，提醒了她生意会很好。"

    - title: "碎掉的杯子"
      surface: "一个男人看到桌上的杯子碎了，于是他决定辞职。"
      truth: "这个男人是一家瓷器厂的质检员。他发现成品杯子有裂痕，意识到工厂为了降低成本偷工减料，生产线存在严重的质量问题。他向上级反映无果后，决定辞职以示抗议。"

    - title: "半杯水"
      surface: "一个女人走进沙漠里的一家餐厅，向服务员要了一杯水。服务员突然拿出一把枪指着她。女人说了声谢谢，然后离开了。"
      truth: "这个女人一直在打嗝，非常难受。她来餐厅要水是想喝水止嗝。服务员看出她在打嗝，突然拿枪吓她，是为了用惊吓的方式帮她止住打嗝。女人被吓了一跳后打嗝果然停了，所以她说了声谢谢就离开了。"

    - title: "电梯里的镜子"
      surface: "一栋大楼的住户们投诉电梯太慢。物业没有换电梯，也没有提速，但投诉却消失了。"
      truth: "物业在电梯门旁边安装了一面大镜子。人们等电梯的时候会不自觉地照镜子、整理仪容，注意力被分散了，就不再觉得等待时间太长，投诉自然就消失了。"

    - title: "深夜的电话"
      surface: "一个男人半夜接到电话后，什么也没说就挂了。第二天一早他就去了警察局。"
      truth: "这个男人的妻子失踪了好几天。半夜打来电话的人没有说话，但他听到了背景里妻子的求救声。他记下了来电号码，第二天一早赶去警察局报案，提供了这个关键线索。"

    - title: "两杯毒酒"
      surface: "国王怀疑大臣要害他，于是命令大臣先喝一杯酒。大臣喝了。然后国王放心地喝了另一杯。但最后国王死了，大臣没事。"
      truth: "毒药不在酒里，在国王自己的酒杯上。大臣事先在国王的杯子边缘涂了毒药。大臣喝的酒和杯子都是干净的，所以他没事。国王虽然看到大臣喝了酒，以为酒安全了，但实际上毒在他自己的杯子上，嘴唇接触杯沿就中毒了。"

    - title: "消失的司机"
      surface: "一辆出租车在路上正常行驶。警察拦下了这辆车，发现车里没有司机，但车确实是自己在开。这不是自动驾驶汽车。"
      truth: "这辆出租车正在被拖车拖走。拖车在前面拉着出租车行驶，出租车的方向盘被固定住了。从后面看，出租车确实像是自己在行驶，但司机其实在前面的拖车里。"

    - title: "第十三层"
      surface: "一个人住在一栋13层的公寓楼里，他住在第12层。每天晚上他都会坐电梯到第10层，然后走楼梯上去。但下雨天他会直接坐电梯到第12层。"
      truth: "这个人是一个小矮人（身材矮小）。他够不到电梯的第12层按钮，平时最高只能按到第10层。但下雨天他带了雨伞，可以用雨伞尖去按第12层的按钮。"

    - title: "照片里的秘密"
      surface: "一个女人翻看家庭相册时，看到一张全家福后突然报了警。照片里没有任何异常的人或物。"
      truth: "这张全家福是在她家客厅拍的。但她注意到照片背景里的窗户外面，有一张陌生人的脸在往屋里看。这意味着当时有人在监视她的家人，她意识到家里可能被跟踪了，于是报了警。"

roles:
  soup_master:
    agent:
      type: ThinkingReActAgent
      kwargs: null
